version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dialer_mobile
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dialer_mobile_secret}
      POSTGRES_DB: dialer_mobile
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
